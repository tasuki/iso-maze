<!DOCTYPE html>
<html>
<head>
    <title>Iso Maze</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="description" content="A-maze-ing..." />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: monospace; user-select: none; }
        .overlay-style { background: rgba(0, 0, 0, 0.4); color: white; border-radius: 8px; padding: 10px; white-space: pre; font-family: sans-serif; }
        #three-container { width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; position: relative; touch-action: none; }

        .modal-backdrop {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-content {
            pointer-events: auto; line-height: 1.5; font-size: 18px; padding: 25px;
            max-height: 90vh; overflow-y: auto;
        }

        #menu { position: absolute; left: 0px; top: 0px; z-index: 9; }
        #menu .item { float: left; padding: 1px 0 0 1px; }
        @media screen and (min-aspect-ratio: 1/1) { #menu .item { float: none; } }

        #menu .icon {
            display: block; cursor: pointer; font-size: 30px; border-radius: 30px;
            line-height: 60px; width: 60px; height: 60px; text-align: center;
        }
        #menu .icon:active { background: #FFF3; }

        #debug-info {
            position: absolute; top: 10px; right: 10px;
            pointer-events: none; z-index: 10; font-size: 12px;
            font-family: monospace;
        }

        .joystick-container { position: absolute; width: 0; height: 0; pointer-events: none; z-index: 100; }
        .joystick-base {
            position: absolute; left: -40px; top: -40px; width: 80px; height: 80px;
            border: 2px solid #FFF4; border-radius: 50%;
        }
        .joystick-crosshair-h { position: absolute; left: -30px; top: 0; width: 60px; height: 2px; background: #FFF3; }
        .joystick-crosshair-v { position: absolute; left: 0; top: -30px; width: 2px; height: 60px; background: #FFF3; }
        .joystick-knob { position: absolute; width: 30px; height: 30px; background: #FFF6; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/main.js"></script>
</body>
</html>
