<!DOCTYPE html>
<html>
<head>
    <title>Iso Maze</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="description" content="A-maze-ing..." />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: monospace; user-select: none; }
        .overlay-style { background: rgba(0, 0, 0, 0.4); color: white; }
        #three-container { width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; position: relative; touch-action: none; }

        #menu { position: absolute; left: 0px; top: 0px; z-index: 9; }
        #menu .item { float: left; padding: 1px 0 0 1px; }
        @media screen and (min-aspect-ratio: 1/1) { #menu .item { float: none; } }

        #menu .icon {
            display: block; cursor: pointer; border-radius: 30px;
            line-height: 30px; width: 30px; height: 30px; text-align: center;
        }

        #menu .icon .tooltip { display: none; }
        #menu .icon:hover .tooltip { display: inline; }
        @media screen and (min-aspect-ratio: 1/1) { #menu .icon:hover { width:auto; padding: 0 10px; } }
        @media screen and (max-aspect-ratio: 1/1) { #menu .icon:hover .tooltip { display: block; position: absolute; top: 25px; color: #fff; } }

        #debug-info {
            position: absolute; top: 10px; right: 10px;
            padding: 5px 10px; pointer-events: none;
            white-space: pre; z-index: 10;
        }

        .joystick-container { position: absolute; width: 0; height: 0; pointer-events: none; z-index: 100; }
        .joystick-base {
            position: absolute; left: -40px; top: -40px; width: 80px; height: 80px;
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50%;
        }
        .joystick-crosshair-h { position: absolute; left: -30px; top: 0; width: 60px; height: 2px; background: rgba(255,255,255,0.2); }
        .joystick-crosshair-v { position: absolute; left: 0; top: -30px; width: 2px; height: 60px; background: rgba(255,255,255,0.2); }
        .joystick-knob { position: absolute; width: 30px; height: 30px; background: rgba(255,255,255,0.5); border-radius: 50%; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/main.js"></script>
</body>
</html>
